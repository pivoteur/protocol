[package]
name = "quizzes"
version = "0.1.0"
edition = "2024"

[lib]
name = "quizzes"
path = "src/quizzes.rs"

[dependencies]
reqwest = { version = "0.12.4", features = ["json"] }

chrono = "0.4.38"
futures = "0.3.31"

tokio = { version = "1", features = ["macros", "rt-multi-thread"] }

libs = { path = "../libs" }

book = { path = "../../crypto-n-rust/src/libs/book" }

[lints.rust.unexpected_cfgs]
level = "warn"
check-cfg = [
    'cfg(tarpaulin_include)'
]

