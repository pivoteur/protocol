name: rat
 
on:
  workflow_dispatch:
  schedule:
    # test the cron ("Min Hour Day Month DayofWeek" in UTC) at scheduled time 
    - cron: "23 01 * * *" # this is 9:23 PM Eastern Standard Time

permissions:
  contents: write

jobs:
  run_all_tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout protocol
        uses: actions/checkout@v4
        with:
          path: protocol

      - name: Checkout crypto-n-rust
        uses: actions/checkout@v4
        with:
          repository: logicalgraphs/crypto-n-rust
          path: crypto-n-rust

      - name: Checkout pivoteur.github.io
        uses: actions/checkout@v4
        with:
          repository: pivoteur/pivoteur.github.io
          path: pivoteur.github.io

      - name: Cache itr binary
        id: itr-cache
        uses: actions/cache@v3
        with:
          path: protocol/dapps/itr/target/debug/itr
          key: itr-binary-${{ hashFiles('protocol/dapps/itr/**/*.rs', 'protocol/dapps/itr/Cargo.toml', 'protocol/dapps/itr/Cargo.lock') }}

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-make
        run: cargo install cargo-make
 
      - name: Install cargo-tarpaulin
        run: cargo install cargo-tarpaulin
 
      - name: Verify checkouts
        run: |
            test -d protocol/.git           || (echo "ERROR: protocol           not checked out" && exit 1)
            test -d crypto-n-rust/.git      || (echo "ERROR: crypto-n-rust      not checked out" && exit 1)
            test -d pivoteur.github.io/.git || (echo "ERROR: pivoteur.github.io not checked out" && exit 1)
            echo "All checkouts verified."

      - name: Add pivot_data_dir and pivot_url to env
        run: |
          echo "PIVOT_DATA_DIR=$GITHUB_WORKSPACE/pivoteur.github.io/data" >> $GITHUB_ENV
          echo "PIVOT_URL=https://raw.githubusercontent.com/pivoteur/pivoteur.github.io" >> $GITHUB_ENV

      - name: "[book] cargo tarpaulin — src/libs/book"
        working-directory: crypto-n-rust/src/libs/book
        run: |
            cargo tarpaulin 2>&1 | tee /tmp/book_tarp.txt
            if grep -q 'test result: FAILED' /tmp/book_tarp.txt; then
              echo "--- [book] TESTS FAILED | $(grep 'coverage' /tmp/book_tarp.txt | tail -1)" | tee -a /tmp/book_tarp.txt
              exit 1
            else
              echo "--- [book] All tests passed | $(grep 'coverage' /tmp/book_tarp.txt | tail -1)" | tee -a /tmp/book_tarp.txt
            fi

      - name: "[libs] cargo tarpaulin — libs"
        working-directory: protocol/libs
        env:
          PIVOT_WALLET_ADDY: ${{ secrets.PIVOT_WALLET_ADDY }}
          PIVOT_MORALIS_API_KEY: ${{ secrets.PIVOT_MORALIS_API_KEY }}
        run: |
            cargo tarpaulin 2>&1 | tee /tmp/libs_tarp.txt
            if grep -q 'test result: FAILED' /tmp/libs_tarp.txt; then
              echo "--- [libs] TESTS FAILED | $(grep 'coverage' /tmp/libs_tarp.txt | tail -1)" | tee -a /tmp/libs_tarp.txt
              exit 1
            else
              echo "--- [libs] All tests passed | $(grep 'coverage' /tmp/libs_tarp.txt | tail -1)" | tee -a /tmp/libs_tarp.txt
            fi

      - name: "[quizzes] cargo make test-flow — quizzes"
        working-directory: protocol/quizzes
        run: |
            cargo make test-flow 2>&1 | tee /tmp/quizzes_test.txt
            if grep -q 'test result: FAILED' /tmp/quizzes_test.txt; then
              echo "--- [quizzes] TESTS FAILED | $(grep 'test result' /tmp/quizzes_test.txt | tail -1)" | tee -a /tmp/quizzes_test.txt
              exit 1
            else
              echo "--- [quizzes] All tests passed | $(grep 'test result' /tmp/quizzes_test.txt | tail -1)" | tee -a /tmp/quizzes_test.txt
            fi
        
      - name: "[quizzes] cargo tarpaulin — quizzes"
        working-directory: protocol/quizzes
        run: |
            cargo tarpaulin 2>&1 | tee /tmp/quizzes_tarp.txt
            if grep -q 'test result: FAILED' /tmp/quizzes_tarp.txt; then
              echo "--- [quizzes] TESTS FAILED | $(grep 'coverage' /tmp/quizzes_tarp.txt | tail -1)" | tee -a /tmp/quizzes_tarp.txt
              exit 1
            else
              echo "--- [quizzes] All tests passed | $(grep 'coverage' /tmp/quizzes_tarp.txt | tail -1)" | tee -a /tmp/quizzes_tarp.txt
            fi
    
      - name: Build itr
        if: steps.itr-cache.outputs.cache-hit != 'true'
        working-directory: protocol/dapps/itr
        run: cargo build

      - name: Add itr to PATH
        run: echo "$GITHUB_WORKSPACE/protocol/dapps/itr/target/debug" >> $GITHUB_PATH

      - name: "[itr] itr . — dapps"
        working-directory: protocol/dapps
        run: |
            itr . 2>&1 | tee /tmp/dapps_itr.txt
            echo "--- [dapps] $(grep 'total:' /tmp/dapps_itr.txt | tail -1)"

      - name: Define log_dir
        run: echo "LOG_DIR=$GITHUB_WORKSPACE/protocol/data" >> $GITHUB_ENV

      - name: Define log file path
        run: echo "LOG=$LOG_DIR/diagnostics.txt" >> $GITHUB_ENV

      - name: Write diagnostics log
        run: |
          echo "=== RAT Diagnostics Log ($(date -u)) ===" > $LOG
          echo "" >> $LOG

          export LOG
          
          write_tarp() {
            local label=$1 file=$2
            local cov=$(grep -oP '[\d.]+(?=% coverage)' $file | tail -1)
            local pass=$(grep -oP '\d+(?= passed)' $file | sort -n | tail -1)
            local fail=$(grep -oP '\d+(?= failed)' $file | sort -n | tail -1)
            local lines=$(grep -oP '\d+/\d+(?= lines)' $file | tail -1)
            local status=$(grep -qE "--- \[$label\] TESTS FAILED" $file && echo 'TESTS FAILED' || echo 'All tests passed')
            echo "--- [$label] ${status} | ${cov:-?}% coverage | ${pass:-0} passed, ${fail:-0} failed | lines: ${lines:-?}" >> $LOG
            grep -A1 'failures:' $file | grep '::' >> $LOG || true
            echo "" >> $LOG
          }

          write_tarp book    /tmp/book_tarp.txt
          write_tarp libs    /tmp/libs_tarp.txt

          QUIZZES_PASS=$(grep -oP '\d+(?= passed)' /tmp/quizzes_test.txt | sort -n | tail -1)
          QUIZZES_FAIL=$(grep -oP '\d+(?= failed)' /tmp/quizzes_test.txt | sort -n | tail -1)
          QUIZZES_STATUS=$(grep -qE 'TESTS FAILED' /tmp/quizzes_test.txt && echo 'TESTS FAILED' || echo 'All tests passed')
          echo "--- [quizzes] test-flow | ${QUIZZES_STATUS} | ${QUIZZES_PASS:-0} passed, ${QUIZZES_FAIL:-0} failed" >> $LOG
          grep -A1 'failures:' /tmp/quizzes_test.txt | grep '::' >> $LOG || true
          echo "" >> $LOG

          write_tarp quizzes /tmp/quizzes_tarp.txt

          echo "--- [dapps] itr" >> $LOG
          grep 'total:' /tmp/dapps_itr.txt | tail -1 >> $LOG || echo "  (no result)" >> $LOG

      - name: Commit diagnostics log to protocol
        env: 
          USER0_NAME: ${{ vars.USER0_NAME }}
          USER0_EMAIL: ${{ secrets.USER0_EMAIL }}
        run: |
          cd protocol
          git config user.name "$USER0_NAME"
          git config user.email "$USER0_EMAIL"
          git add $LOG
          git commit -m "rat's diagnostic log [skip ci]" || echo "No changes to commit"
          git push
