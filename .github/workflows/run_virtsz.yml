name: Run virtsz

on:
  workflow_dispatch:
  schedule:
    # test the cron ("Min Hour Day Month DayofWeek" in UTC) at scheduled time
    - cron: "05 08 * * *" # in our time zone, this is 4:05 AM Eastern Time

permissions:
  contents: write

jobs:
  run-virtsz:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout protocol # Repository A
        uses: actions/checkout@v4
        with:
          path: protocol

      - name: Set up rust
        uses: actions-rs/toolchain@v1
        with: 
          toolchain: stable
          
      - name: Build virtsz 
        run: cargo build protocol/dapps/virtsz --bin virtsz 

      - name: Checkout pivoteur.github.io # Repository B
        uses: actions/checkout@v4
        with:
          repository: program/pivoteur.github.io
          token: ${{ secrets.PIVOTEUR_TOKEN }}
          path: pivoteur.github.io # virtsz will read/write here

      - name: Run The Echo and Display The Date
        run: echo "LE_DATE=$(date +'%Y-%m-%d')" >> $GITHUB_ENV

      - name: Run virtsz
        run: |
         /auto-virtsz.sh pivot $LE_DATE ../../../pivoteur.github.io/data/pivots/open/raw/*.tsv

      - name: Commit and push results to pivoteur.github.io
        env: 
          USER1_NAME: ${{ vars.USER1_NAME }}
          USER1_EMAIL: ${{ secrets.USER1_EMAIL }}
        run: |
          git config user.name "$USER1_NAME"
          git config user.email "$USER1_EMAIL"
          git add data/pivots/open/raw/*.tsv
          git commit -m "virtsz updated $LE_DATE"
          git push

